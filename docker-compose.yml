version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: resumeai-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resumeaipro

  backend:
    build: ./backend
    container_name: resumeai-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/resumeaipro
      JWT_SECRET: dev-secret-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mongo_data:
